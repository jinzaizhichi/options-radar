name: Daily Options Scan

on:
  schedule:
    - cron: '30 22 * * 1-5'   # 美东时间收盘后，周一到周五
  workflow_dispatch:
    inputs:
      backfill:
        description: '首次运行回填52周IV历史'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run scan on VPS
        run: |
          BACKFILL_FLAG=""
          if [ "${{ inputs.backfill }}" = "true" ]; then
            BACKFILL_FLAG="--backfill"
          fi
          ssh -p 2222 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            -o StrictHostKeyChecking=no \
            "cd /opt/options-radar && source venv/bin/activate && python -m scanner.main $BACKFILL_FLAG"
